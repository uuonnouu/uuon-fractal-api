# uuon-fractal-api · docker-compose.yml
# One-command local deploy: docker compose up
# Opens: http://localhost:8080/sandbox  (zero-config demo)
#         http://localhost:8080/docs    (interactive Swagger UI)

version: "3.9"

services:

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - UUON_API_VERSION=1.0.0
    depends_on:
      - redis
    volumes:
      - .:/app
    command: python uuon_fractal_api_main.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
